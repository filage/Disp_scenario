version: "2"
sql:
  - engine: postgresql
    schema: migrations/000001_init.up.sql
    queries: queries
    gen:
      go:
        package: db
        out: internal/database/db
        sql_package: pgx/v5
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: uuid
            nullable: true
            go_type:
              import: github.com/google/uuid
              type: NullUUID

