name: ci

on:
  push:
  pull_request:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  keep-render-awake:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Render services
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 https://disp-scenario-api.onrender.com/health
          curl --fail --silent --show-error --max-time 30 https://disp-scenario-web.onrender.com/api/health

  source-policy:
    if: github.event_name != 'schedule'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: ./scripts/verify-no-js.ps1

  frontend:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run generate:api
      - run: npm run lint
      - run: npm test
      - run: npm run build

  backend:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache-dependency-path: backend/go.sum
      - run: go mod download
      - run: go test -race ./...
      - run: go test -tags=integration ./internal/recording
      - run: go vet ./...
      - run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run
      - run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.4.0 ./...

  compose:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    needs: [frontend, backend, source-policy]
    env:
      GEMINI_API_KEY: ci-compose-smoke-not-used
      GEMINI_MODEL: ci-compose-smoke-not-used
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npx playwright install --with-deps chromium
      - run: docker compose config --quiet
      - run: docker compose up -d --build
      - run: |
          for attempt in $(seq 1 60); do
            curl --fail http://localhost:8787/health && curl --fail http://localhost:3000/overview && exit 0
            sleep 5
          done
          docker compose ps -a
          docker compose logs
          exit 1
      - working-directory: frontend
        env:
          E2E_USE_EXISTING_SERVER: "true"
        run: npx playwright test tests/e2e/navigation.spec.ts
      - name: Verify backup restore
        shell: pwsh
        run: |
          docker compose stop frontend api worker
          ./scripts/backup.ps1
          $manifest = Get-ChildItem ./backups/manifest-*.json |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $manifest) {
            throw "Backup manifest was not created."
          }
          ./scripts/verify-backup-restore.ps1 -ManifestFile $manifest.FullName
      - if: always()
        run: docker compose down -v

  real-video-e2e:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    needs: [frontend, backend, source-policy]
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      E2E_REAL_VIDEO_URL: ${{ secrets.E2E_REAL_VIDEO_URL }}
      E2E_REAL_VIDEO_BASE64: ${{ secrets.E2E_REAL_VIDEO_BASE64 }}
    steps:
      - uses: actions/checkout@v4
      - name: Check real-video prerequisites
        id: preflight
        run: |
          if [ -n "$GEMINI_API_KEY" ] && { [ -n "$E2E_REAL_VIDEO_URL" ] || [ -n "$E2E_REAL_VIDEO_BASE64" ]; }; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Real-video E2E skipped: configure GEMINI_API_KEY and E2E_REAL_VIDEO_URL (or E2E_REAL_VIDEO_BASE64) repository secrets to enable it."
          fi
      - uses: actions/setup-node@v4
        if: steps.preflight.outputs.enabled == 'true'
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        if: steps.preflight.outputs.enabled == 'true'
        run: npm ci
      - working-directory: frontend
        if: steps.preflight.outputs.enabled == 'true'
        run: npx playwright install --with-deps chromium
      - name: Prepare real E2E video fixture
        if: steps.preflight.outputs.enabled == 'true'
        run: |
          mkdir -p tests/fixtures
          if [ -n "$E2E_REAL_VIDEO_URL" ]; then
            curl --fail --location "$E2E_REAL_VIDEO_URL" --output tests/fixtures/e2e-real.mp4
          else
            printf '%s' "$E2E_REAL_VIDEO_BASE64" | base64 -d > tests/fixtures/e2e-real.mp4
          fi
          test -s tests/fixtures/e2e-real.mp4
      - if: steps.preflight.outputs.enabled == 'true'
        run: docker compose config --quiet
      - if: steps.preflight.outputs.enabled == 'true'
        run: docker compose up -d --build
      - if: steps.preflight.outputs.enabled == 'true'
        run: |
          for attempt in $(seq 1 60); do
            curl --fail http://localhost:8787/health && curl --fail http://localhost:3000/overview && exit 0
            sleep 5
          done
          docker compose ps -a
          docker compose logs
          exit 1
      - working-directory: frontend
        if: steps.preflight.outputs.enabled == 'true'
        env:
          E2E_USE_EXISTING_SERVER: "true"
          E2E_FULL_STACK: "true"
          E2E_REAL_VIDEO: ../tests/fixtures/e2e-real.mp4
        run: npx playwright test tests/e2e/full-flow.spec.ts
      - if: ${{ always() && steps.preflight.outputs.enabled == 'true' }}
        run: docker compose down -v
